services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - '5533:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U botuser -d driver_test']
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - '8010:8000'
    volumes:
      - ./images:/app/images

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '8090:80'
    volumes:
      - ./images:/usr/share/nginx/html/images:ro
    depends_on:
      - backend

  parser:
    build: ./parser
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./images:/app/images
    profiles: ['parser']

  translator:
    build: ./translator
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    profiles: ['translator']

volumes:
  pgdata:
